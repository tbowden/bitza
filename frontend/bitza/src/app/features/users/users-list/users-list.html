<div class="page-header">
  <h1>Users</h1>
  <button mat-flat-button color="primary" type="button" (click)="onCreate()">
    <mat-icon>person_add</mat-icon>
    New user
  </button>
</div>

@if (loadError()) {
  <p class="error-text" role="alert">Couldn't load users. Try refreshing.</p>
} @else if (loading()) {
  <div class="loading-row">
    <mat-progress-spinner diameter="28" mode="indeterminate"></mat-progress-spinner>
  </div>
} @else {
  <table mat-table [dataSource]="users()" class="users-table">
    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef>User</th>
      <td mat-cell *matCellDef="let user">
        {{ user.username }}
        <span class="user-email">{{ user.email }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let user">{{ user.role }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let user">
        @if (user.is_suspended) {
          <span class="status-tag suspended-tag">suspended</span>
        } @else {
          <span class="status-tag">active</span>
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let user">
        @if (canManage(user)) {
          <button
            mat-icon-button
            type="button"
            [attr.aria-label]="'Edit ' + user.username"
            matTooltip="Edit"
            (click)="onEdit(user)"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            [attr.aria-label]="(user.is_suspended ? 'Unsuspend ' : 'Suspend ') + user.username"
            [matTooltip]="user.is_suspended ? 'Unsuspend' : 'Suspend'"
            (click)="onToggleSuspend(user)"
          >
            <mat-icon>{{ user.is_suspended ? 'lock_open' : 'lock' }}</mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            [attr.aria-label]="'Delete ' + user.username"
            matTooltip="Delete"
            (click)="onDelete(user)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
}

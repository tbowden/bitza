version: "3.9"

# ---------------------------------------------------------------------------
# Bitza asset management API
#
# Designed to sit behind your existing nginx reverse proxy.
# The app container is not exposed externally — nginx forwards to it
# via the shared proxy_network.
#
# Usage:
#   docker compose up -d
#
# To connect from your nginx reverse proxy container, proxy_pass to:
#   http://bitza_app:8000
# ---------------------------------------------------------------------------

services:
  app:
    container_name: bitza_app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      APP_ENV: ${APP_ENV:-prod}

    volumes:
      - bitza_data:/app/data
      - ./.env.prod:/app/.env.prod:ro

    networks:
      - proxy_network

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  bitza_data:
    driver: local

networks:
  # Change this name to match your existing nginx reverse proxy network.
  proxy_network:
    external: true
    name: nginx_proxy_network
